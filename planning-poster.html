<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#051322" />
    <title>学习规划部六月最终PK战报</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="assets/team-poster.css" />
  </head>
  <body class="theme-planning" data-module="学习规划部" data-team-label="规划" data-team-en="PLANNING TEAM">
    <main class="team-poster" aria-label="学习规划部六月最终PK战报">
      <div class="poster-plate">
        <header class="poster-head">
          <div>
            <p class="season-mark" id="seasonMark">JUNE FINAL REPORT / PLANNING TEAM</p>
            <h1><span id="teamTitle" class="title-main">学习规划部</span><span class="title-sub">六月最终战报</span></h1>
          </div>
          <div class="poster-head-meta">
            <div class="final-data-mark" aria-label="6月最终数据">
              <span>JUNE FINAL</span>
              <strong>6月最终数据</strong>
            </div>
            <div class="date-lockup">
              <span id="posterDate">数据同步中</span>
              <strong id="teamBadge">规划专属</strong>
            </div>
          </div>
        </header>

        <section class="hero-board" aria-label="规划部核心战况">
          <article class="total-score">
            <span>累计金额</span>
            <strong id="totalGross">--</strong>
            <small id="totalSubline">-- 场战局</small>
          </article>
          <div class="mini-kpis" id="miniKpis"></div>
          <article class="loot-board">
            <span>全组战利品</span>
            <div id="lootBoard" class="loot-levels"></div>
          </article>
          <article class="mvp-card">
            <span>六月主将</span>
            <strong id="mvpName">--</strong>
            <small id="mvpDetail">--</small>
          </article>
        </section>

        <section class="growth-board" aria-label="规划部收官日增长榜">
          <article class="growth-panel">
            <strong>收官日增长小组 TOP 5</strong>
            <div id="groupGrowthList" class="growth-list"></div>
          </article>
          <article class="growth-panel">
            <strong>收官日增长伙伴 TOP 5</strong>
            <div id="partnerGrowthList" class="growth-list"></div>
          </article>
        </section>

        <section class="battle-wall" aria-label="规划部所有战局">
          <div class="wall-title">
            <strong>全部战局播报</strong>
            <span id="wallMeta">2人PK左右对战，3人PK同排展示</span>
          </div>
          <div id="battleGrid" class="battle-grid"></div>
        </section>

        <footer class="poster-foot">
          <span>小组长金额按GMV统计</span>
          <strong id="posterNote">数据来自当前战报</strong>
        </footer>
      </div>
    </main>
    <script src="data/report-data.js"></script>
    <script src="assets/team-poster.js"></script>
  </body>
</html>

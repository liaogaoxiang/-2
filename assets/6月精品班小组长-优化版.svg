  <rect x="188" y="1334" width="1624" height="2" fill="url(#goldLine)"/>
  <text x="1000" y="1378" class="cn muted" text-anchor="middle" font-size="29" font-weight="600">若GMV净收【40000-60000）得800元定额奖金；GMV刚好处于档位划分处时取高档</text>

  <g transform="translate(648 1404)">
    <rect width="704" height="74" rx="37" fill="#2E180F" stroke="#F7C86B" stroke-opacity=".8" stroke-width="3"/>
    <text x="352" y="51" class="cn ink" text-anchor="middle" font-size="36" font-weight="750">统计时间：2026年6月自然月</text>
  </g>
</svg>

      <text x="1534" y="488" fill="#C2E59E" class="num rowNum" text-anchor="middle">4,940 - 6,840</text>

      <g transform="translate(66 539)">
        <rect width="92" height="56" rx="14" fill="#C68A25"/>
        <text x="46" y="42" text-anchor="middle" fill="#FFF" font-size="42" font-weight="850">3</text>
      </g>
      <text x="188" y="580" class="ink rowText">第3阶</text>
      <text x="698" y="581" class="ink num rowNum" text-anchor="middle">100,000 - 130,000</text>
      <text x="1128" y="582" fill="#F4D485" class="num" text-anchor="middle" font-size="56" font-weight="850">3.4%</text>
      <text x="1534" y="581" fill="#F4D485" class="num rowNum" text-anchor="middle">3,400 - 4,420</text>

      <g transform="translate(66 632)">
        <rect width="92" height="56" rx="14" fill="#C56C28"/>
        <text x="46" y="42" text-anchor="middle" fill="#FFF" font-size="42" font-weight="850">2</text>
      </g>
      <text x="188" y="673" class="ink rowText">第2阶</text>
      <text x="698" y="674" class="ink num rowNum" text-anchor="middle">80,000 - 100,000</text>
      <text x="1128" y="675" fill="#F3B66B" class="num" text-anchor="middle" font-size="56" font-weight="850">3.1%</text>
      <text x="1534" y="674" fill="#F3B66B" class="num rowNum" text-anchor="middle">2,480 - 3,100</text>

      <g transform="translate(66 725)">
        <rect width="92" height="56" rx="14" fill="#C84432"/>
        <text x="46" y="42" text-anchor="middle" fill="#FFF" font-size="42" font-weight="850">1</text>
      </g>
      <text x="188" y="766" class="ink rowText">第1阶</text>
      <text x="698" y="767" class="ink num rowNum" text-anchor="middle">60,000 - 80,000</text>
      <text x="1128" y="768" fill="#FF907A" class="num" text-anchor="middle" font-size="56" font-weight="850">2.8%</text>
      <text x="1534" y="767" fill="#FF907A" class="num rowNum" text-anchor="middle">1,680 - 2,240</text>

      <g transform="translate(66 811)">
        <rect width="92" height="56" rx="14" fill="#706A67"/>
        <text x="46" y="41" text-anchor="middle" fill="#FFF" font-size="36" font-weight="850">-</text>
      </g>
      <text x="188" y="852" class="ink rowText">未达阶梯</text>
      <text x="698" y="853" class="ink num rowNum" text-anchor="middle">&lt; 60,000</text>
      <text x="1128" y="853" class="muted num rowNum" text-anchor="middle">-</text>
      <text x="1534" y="853" class="muted num rowNum" text-anchor="middle">-</text>
